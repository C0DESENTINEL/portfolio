{% load static %}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Erik Walther — Software Developer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Software developer gespecialiseerd in Django, Python en web security.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}django, python, software developer, web security{% endblock %}">
    <meta name="author" content="Erik Walther">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://erikwalther.eu">

    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://erikwalther.eu">
    <meta property="og:title" content="{% block og_title %}Erik Walther — Software Developer{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Software developer gespecialiseerd in Django, Python en web security.{% endblock %}">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Erik Walther">
    <meta name="fediverse:creator" content="@breqoftoren@social.linux.pizza">

    <link href="{% static 'css/main.css' %}" rel="stylesheet">

    <link rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/" />
    <meta property="cc:license" content="https://creativecommons.org/licenses/by-sa/4.0/" xmlns:cc="http://creativecommons.org/ns#" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://erikwalther.eu/",
      "copyrightHolder": {
        "@type": "Person",
        "name": "Erik Walther"
      },
      "license": "https://creativecommons.org/licenses/by-sa/4.0/"
    }
    </script>

</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header class="container-wide">
        <div class="container header-center">
            <a href="/" class="nav-brand" aria-label="Terug naar home">
                <img src="{% static 'images/logo.svg' %}" alt="Erik Walther Portfolio" width="40" height="40">
                <span class="brand-text">Erik Walther</span>
            </a>
        </div>
    </header>

    <main id="main-content" class="container-wide">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer container-wide">
        <div class="container footer-content">
            <div class="contact-info">
                <div class="contact-item">
                    <span class="label">Email:</span>
                    <a href="mailto:erik@erikwalther.eu">erik@erikwalther.eu</a>
                    <a href="https://keys.openpgp.org/vks/v1/by-fingerprint/C3F1956600508973C5D3D4704E317A9633011740"
                       target="_blank"
                       rel="noopener noreferrer"
                       title="Download PGP Key"
                       aria-label="PGP Key">
                        🔑
                    </a>
                </div>
                <div class="contact-item separator">
                    <span class="label">Social:</span>
                    <a rel="me" href="https://social.linux.pizza/@breqoftoren">Mastodon</a>
                </div>
            </div>

            <div class="copyright">
                &copy; {% now "Y" %} Erik Walther.
                <a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>
            </div>
        </div>
    </footer>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Erik Walther",
        "url": "https://erikwalther.eu",
        "jobTitle": "Software Developer"
    }
    </script>

    {% block structured_data %}{% endblock %}
</body>
</html>
