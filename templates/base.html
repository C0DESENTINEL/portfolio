{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Erik Walther — Software Developer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Full stack development, web security, Tor relay maintenance, and studies from Boot.dev and Hack The Box.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}django, python, software developer, web security, Tor relay, boot.dev, Hack The Box{% endblock %}">
    <meta name="author" content="Erik Walther">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://{{ request.get_host }}{{ request.path }}" />

    <link rel="icon" type="image/svg+xml" href="{% static 'favicon/favicon.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">

    <meta name="fediverse:creator" content="@breqoftoren@social.linux.pizza">

    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Erik Walther: Building Private & Secure Solutions{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Full-stack development with focus on SEO en security and privacy, Tor relay maintenance and reports on studies from Boot.dev and Hack The Box.{% endblock %}">
    <meta property="og:image" content="{{ og_image_url|default:'https://erikwalther.eu/static/images/card-banner.svg' }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Erik Walther">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page_title|default:'Building Private & Secure Solutions' }}">
    <meta name="twitter:description" content="{{ meta_description|default:'Full-stack development with focus on SEO en security and privacy, Tor relay maintenance and reports on studies from Boot.dev and Hack The Box.' }}">
    <meta name="twitter:image" content="{{ og_image_url|default:'https://erikwalther.eu/static/images/card-banner.svg' }}">

    <link href="{% static 'css/main.css' %}" rel="stylesheet">

    <link rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/" />
    <meta property="cc:license" content="https://creativecommons.org/licenses/by-sa/4.0/" xmlns:cc="http://creativecommons.org/ns#" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://erikwalther.eu/",
      "copyrightHolder": {
        "@type": "Person",
        "name": "Erik Walther"
      },
      "license": "https://creativecommons.org/licenses/by-sa/4.0/"
    }
    </script>

</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <div class="container header-center">
            <a href="/" class="nav-brand" aria-label="Terug naar home">
                <img src="{% static 'images/logo.svg' %}" alt="Erik Walther Portfolio" loading="lazy" width="40" height="40">
                <span class="brand-text">Erik Walther</span>
            </a>
        </div>
    </header>

    <main id="main-content" class="container-wide">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <!-- Copyright & Licentie -->
                <div class="copyright">
                    <p>&copy; {% now "Y" %} Erik Walther. Built with Django.</p>
                    <p class="license">
                        <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="license noopener noreferrer" aria-label="Creative Commons BY-SA 4.0">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-7.5v-3h2v3h3v2h-3v3h-2v-3H8v-2h3z"/>
                            </svg>
                            CC BY-SA 4.0
                        </a>
                    </p>
                </div>

                <!-- Sociale Links -->
                <div class="contact-info">
                    <div class="contact-item">
                        <a rel="me noopener noreferrer" href="https://social.linux.pizza/@breqoftoren" target="_blank" aria-label="Mastodon Profile">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M23.268 5.313c-.35-2.578-2.617-4.61-5.304-5.004C17.51.242 15.792 0 11.813 0h-.03c-3.98 0-4.835.242-5.288.309C3.882.692 1.496 2.518.917 5.127.64 6.412.61 7.837.661 9.143c.074 1.874.088 3.745.26 5.611.118 1.24.325 2.47.62 3.68.55 2.237 2.777 4.098 4.96 4.857 2.336.792 4.849.923 7.256.38.265-.061.527-.132.786-.213.585-.184 1.27-.39 1.774-.753a.057.057 0 0 0 .023-.043v-1.809a.052.052 0 0 0-.02-.041.053.053 0 0 0-.046-.01 20.282 20.282 0 0 1-4.709.547c-2.73 0-3.463-1.284-3.674-1.818a5.593 5.593 0 0 1-.319-1.433.053.053 0 0 1 .066-.054 19.648 19.648 0 0 0 4.636.536c.374 0 .748 0 1.125-.01 1.83-.04 3.76-.126 5.558-.565 .046-.012.09-.023.134-.038 2.44-.59 4.765-2.436 4.956-6.377.009-.174.032-1.813.032-1.99 0-.61.195-4.326-.292-6.603zM19.37 12.42v4.398h-2.41V12.6c0-1.253-.527-1.889-1.582-1.889-1.166 0-1.75.757-1.75 2.254v2.574h-2.396V12.97c0-1.497-.584-2.254-1.75-2.254-1.055 0-1.582.636-1.582 1.89v4.217H5.49V12.42c0-1.25.319-2.247.958-2.99.66-.743 1.524-1.124 2.596-1.124 1.242 0 2.182.477 2.808 1.431l.605 1.014.605-1.014c.626-.954 1.566-1.43 2.808-1.43 1.072 0 1.936.38 2.596 1.123.639.743.958 1.74.958 2.99z"/>
                            </svg>
                            Mastodon
                        </a>
                    </div>

                    <div class="separator"></div>

                    <div class="contact-item">
                        <a href="https://www.boot.dev/u/codesentinel" target="_blank" rel="noopener noreferrer" aria-label="Boot.dev Profile">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 12l-4-4 4-4 4 4-4 4z"/>
                            </svg>
                            Boot.dev
                        </a>
                    </div>

                    <div class="separator"></div>

                    <div class="contact-item">
                        <a href="https://github.com/C0DESENTINEL" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
                                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                            </svg>
                            GitHub
                        </a>
                    </div>

                    <div class="separator"></div>

                    <div class="contact-item">
                        <a href="https://profile.hackthebox.com/profile/019d8771-65b1-71da-906b-67a9af709fb5" target="_blank" rel="noopener noreferrer" aria-label="Hack The Box Profile">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                            </svg>
                            HTB
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Erik Walther",
        "url": "https://erikwalther.eu",
        "jobTitle": "Software Developer"
    }
    </script>

    {% block structured_data %}{% endblock %}
</body>
</html>
