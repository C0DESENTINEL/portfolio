{% load static %}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Erik Walther — Software Developer{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Software developer gespecialiseerd in Django, Python en web security.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}django, python, software developer, web security{% endblock %}">
    <meta name="author" content="Erik Walther">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://erikwalther.eu">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://erikwalther.eu">
    <meta property="og:title" content="{% block og_title %}Erik Walther — Software Developer{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Software developer gespecialiseerd in Django, Python en web security.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{% static 'images/og-image.jpg' %}{% endblock %}">
    <meta property="og:locale" content="nl_NL">
    <meta property="og:site_name" content="Erik Walther">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://erikwalther.eu">
    <meta name="twitter:title" content="{% block twitter_title %}Erik Walther — Software Developer{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Software developer gespecialiseerd in Django, Python en web security.{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{% static 'images/twitter-card.jpg' %}{% endblock %}">

    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">

    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <div class="container nav">
            <a href="/" class="nav-brand">Erik Walther</a>
            <nav aria-label="Main navigation">
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/projects/">Projects</a></li>
                    <li><a href="/about/">About</a></li>
                    <li><a href="/contact/">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Erik Walther. Built with Django.</p>
        </div>
    </footer>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Erik Walther",
        "url": "https://erikwalther.eu",
        "jobTitle": "Software Developer"
    }
    </script>

    {% block structured_data %}{% endblock %}
</body>
</html>
