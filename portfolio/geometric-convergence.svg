<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Subtle background grid for depth -->
  <defs>
    <pattern id="subGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#e0e0e0"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#subGrid)"/>

  <!-- Main Hexagon (Security/Structure) -->
  <path d="M400 80 L540 160 L540 320 L400 400 L260 320 L260 160 Z"
        fill="none" stroke="#2c3e50" stroke-width="2" stroke-linejoin="miter"/>

  <!-- Inner Hexagon (Depth) -->
  <path d="M400 110 L510 173 L510 297 L400 360 L290 297 L290 173 Z"
        fill="none" stroke="#34495e" stroke-width="1"/>

  <!-- Code Bracket Integration (Clean & Sharp) -->
  <path d="M340 200 L310 200 L300 220 L310 240 L340 240"
        fill="none" stroke="#2980b9" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M460 200 L490 200 L500 220 L490 240 L460 240"
        fill="none" stroke="#2980b9" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Connecting line for flow -->
  <line x1="340" y1="220" x2="460" y2="220" stroke="#2980b9" stroke-width="1" stroke-dasharray="4 4"/>
</svg>
